name: Build Wheels, Update Changelog, and Publish to PyPI
on:
  workflow_dispatch:
  push:
    tags:
      - '*' 
permissions:
  contents: write
jobs:
  build-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: hynek/build-and-inspect-python-package@v2

  update-changelog:
    needs: [build-package]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Run the changelog script for full release (no rc)
        if: "!contains(github.ref, 'rc')"
        run: python .github/workflows/news-changelog.py

      - name: Automatically commit changes full release (no rc)
        if: "!contains(github.ref, 'rc')"
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: update changelog
          branch: pypi-build  # FIXME: change to main
   
      # - name: Run specific script for RC tags
      #   if: contains(githgitub.ref, 'rc')

  pypi-publish:
    needs: [build-package, update-changelog]
    environment:
      name: testpypi
      url: https://test/pypi.org/p/cifkit
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Packages
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true

  create-release:
    needs: [update-changelog]
    runs-on: ubuntu-latest
    steps:
      - name: Create Release for Full Versions
        if: contains(github.ref, 'rc')
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
